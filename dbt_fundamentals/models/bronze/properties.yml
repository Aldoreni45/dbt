version: 2

models:
  - name: dim_customer
    description: "Bronze customer table loaded from raw source"
    config:
      materialized: table
    columns:
      - name: customer_sk
        data_tests:
          - not_null
          - unique

  - name: dim_date
    description: "Bronze date dimension loaded from raw source"
    config:
      materialized: table
    columns:
      - name: date_sk
        data_tests:
          - not_null
          - unique

  - name: dim_product
    description: "Bronze product table loaded from raw source"
    config:
      materialized: table
    columns:
      - name: product_sk
        data_tests:
          - not_null
          - unique
      - name: list_price
        data_tests:
          - not_negative

  - name: dim_store
    description: "Bronze store table loaded from raw source"
    config:
      materialized: table
    columns:
      - name: store_sk
        data_tests:
          - not_null
          - unique

  - name: fact_sales
    description: "Bronze sales fact table loaded from raw source"
    config:
      materialized: table
    columns:
      - name: sales_id
        data_tests:
          - not_null
          - unique

  - name: fact_returns
    description: "Bronze returns fact table loaded from raw source"
    config:
      materialized: table
    columns:
      - name: sales_id
        data_tests:
          - not_null
          - unique
